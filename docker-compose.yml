name: agentic-ai-lab

networks:
  agentic-ai-network:
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — primary relational store (n8n + future Spring Boot)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: agentic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - agentic-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # pgAdmin — database management UI (host access via localhost)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: agentic-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - ./scripts/pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - agentic-ai-network
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Redis — cache / session store (Phase 2 Spring Boot)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - agentic-ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant — vector database (Phase 4 RAG)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: agentic-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    networks:
      - agentic-ai-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200\" <&3'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (Phase 3 document uploads)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: agentic-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - agentic-ai-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9000'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: agentic-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-documents}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb local/$${MINIO_BUCKET_DOCUMENTS} --ignore-existing &&
        echo 'MinIO bucket ready: '$${MINIO_BUCKET_DOCUMENTS}
      "
    networks:
      - agentic-ai-network

  # ---------------------------------------------------------------------------
  # n8n — workflow orchestration (PostgreSQL persistence, not SQLite)
  # Stores workflow_entity, credentials_entity, execution_entity in agentic_ai
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:2.30.4
    container_name: agentic-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-agentic_ai}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-America/New_York}
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./data/n8n:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    networks:
      - agentic-ai-network
    depends_on:
      postgres:
        condition: service_healthy

